<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario — U4</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="contenedor">
        <h1>Registro de Usuario</h1>
        <form id="form-registro" novalidate>
            <div class="campo-grupo">
                <label for="nombre">Nombre completo</label>
                <input id="nombre" type="text" name="nombre" required minlength="3" maxlength="60" placeholder="Ej: Ana García
 <span class=" msg-error" id="error-nombre"></span>
            </div>
            <div class="campo-grupo">
                <label for="email">Correo electrónico</label>
                <input id="email" type="email" name="email" required placeholder="usuario@dominio.com">
                <span class="msg-error" id="error-email"></span>
            </div>
            <div class="campo-grupo">
                <label for="password">Contraseña</label>
                <input id="password" type="password" name="password" required minlength="8"
                    placeholder="Mínimo 8 caracteres">
                <span class="msg-error" id="error-password"></span>
            </div>
            <div class="campo-grupo">
                <label for="confirmar">Confirmar contraseña</label>
                <input id="confirmar" type="password" name="confirmar" required placeholder="Repita la contraseña">
                <span class="msg-error" id="error-confirmar"></span>
            </div>
            <div class="campo-grupo">
                <label for="telefono">Teléfono (opcional)</label>
                <input id="telefono" type="tel" name="telefono" pattern="[0-9]{7,15}"
                    placeholder="Solo dígitos, 7-15 caracteres">
                <span class="msg-error" id="error-telefono"></span>
            </div>
            <button type="submit" id="btn-registrar">Registrarse</button>
            <div id="mensaje-exito" class="oculto">
                Registro exitoso. Bienvenido al sistema.
            </div>
        </form>
    </main>
    <script src="validacion.js" defer></script>
</body>

</html>
